<form id="search" role="search" [formGroup]="search_form" (ngSubmit)="search()">
  <div class="input-group input-group-sm rounded border border-2">
    <div class="input-group-text border-0 p-0 bg-body">
      <a role="button" class="btn focus-ring p-0" (click)="search(); collapse()" [ngbTooltip]="'header.search' | translate" [ariaLabel]="'header.search' | translate">
        <span class="material-symbols-outlined">search</span>
      </a>
    </div>

    <input id="text" class="form-control border-0 col-10 shadow-none" type="search" formControlName="text"
      [placeholder]="'header.search'| translate" aria-label="Search">
    <div class="input-group-text border-0 p-0 bg-body">
      <a class="btn focus-ring p-0" role="button" [ngbTooltip]="'header.advancedSearch' | translate"
        [routerLink]="['/advanced-search']" (click)="collapse()" [ariaLabel]="'header.advancedSearch' | translate">
        <span class="material-symbols-outlined">tune</span>
      </a>
    </div>
  </div>
</form>
