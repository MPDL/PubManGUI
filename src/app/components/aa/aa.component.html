@if (!aa.isLoggedIn) {
  <div class="nav-item">
    <!-- empty array as routerLink value enables hand pointer -->
    <button type="button" class="nav-link" (click)="modalService.open(LoginComponent)" data-test="user-login" [ngbTooltip]="'header.signIn' | translate">
      <span class="material-symbols-outlined">login</span></button>
      <!--<button type="button" class="btn btn-outline-primary" (click)="modalService.open(LoginComponent)">Login</button>-->
    </div>
  }
  @if (aa.isLoggedIn) {
    <div class="nav-item dropdown-center">
      <button type="button" class="nav-link dropdown-toggle" id="navbarDropdown"
        data-bs-toggle="dropdown" aria-expanded="false" data-test="user">
        <i class="bi bi-person"></i>
        <span class="d-none d-xxl-inline" data-test="username">{{aa.principal.getValue().user?.name}}</span>
        <span class="d-inline d-xxl-none">{{aa.principal.getValue().user?.name!.split(" ")[0]}}</span>
      </button>
      <ul class="dropdown-menu m-0" aria-labelledby="navbarDropdown">
        <li><button type="button" class="dropdown-item" (click)="modalService.open(UserProfileComponent, {size: 'lg'})">{{ 'header.profile' | translate }}</button></li>
        <li><button type="button" class="dropdown-item" (click)="sign_out()" data-test="sign-out">{{ 'header.signOut' | translate}}</button></li>
      </ul>
    </div>
  }
